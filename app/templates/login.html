<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="login-shell">
    <main class="login-card">
      <div class="brand-block">
        <img src="/static/watershed-logo.webp" alt="Watershed Church logo" class="brand-logo" />
        <div>
          <p class="eyebrow">Church Operations</p>
          <h1>{{ app_name }}</h1>
          <p class="muted">Centralize punch lists, assignments, and upcoming ministry events behind one secure login.</p>
        </div>
      </div>

      <form method="post" action="/login" class="login-form">
        <label>
          Email
          <input type="email" name="email" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}
        <button type="submit">Sign In</button>
      </form>
    </main>
  </body>
</html>
